<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCC OJO1 Cathedral</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f4c75 0%, #3282b8 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
  }
  .flyer {
    background: #fff;
    border-radius: 20px;
    max-width: 420px;
    padding: 40px 30px 30px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    border-top: 8px solid #d4af37;
  }
  .church-name {
    color: #0f4c75;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 1px;
    margin-bottom: 5px;
  }
  .cross {
    font-size: 40px;
    color: #d4af37;
    margin: 10px 0;
  }
  .title {
    color: #3282b8;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 30px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .service {
    background: #f0f7ff;
    border-left: 4px solid #d4af37;
    padding: 15px;
    margin: 15px 0;
    border-radius: 8px;
    text-align: left;
  }
  .service-name {
    font-weight: 700;
    color: #0f4c75;
    font-size: 16px;
  }
  .service-time {
    color: #3282b8;
    font-size: 14px;
    margin-top: 4px;
  }
  .contact {
    margin-top: 25px;
    padding-top: 20px;
    border-top: 1px solid #e0e0e0;
    font-size: 14px;
    color: #555;
  }
  .contact-item {
    margin: 8px 0;
  }
  .footer {
    margin-top: 20px;
    font-size: 12px;
    color: #777;
    font-style: italic;
  }
  .credit {
    margin-top: 15px;
    font-size: 11px;
    color: #aaa;
  }
</style>
</head>
<body>
  <div class="flyer">
    <div class="church-name">CCC OJO1 CATHEDRAL</div>
    <div class="cross">✝</div>
    <div class="title">Service Schedule</div>
    
    <div class="service">
      <div class="service-name">Sunday Service</div>
      <div class="service-time">10:00AM - 2:00PM</div>
    </div>
    
    <div class="service">
      <div class="service-name">Prophet & Prophetesses Night</div>
      <div class="service-time">Thursday 11:00PM - 1:00AM</div>
    </div>
    
    <div class="service">
      <div class="service-name">New Moon Service</div>
      <div class="service-time">Every First Friday</div>
    </div>
    
    <div class="contact">
      <div class="contact-item">📍 Mile 10 Bus Stop, 18 Ariyo St, Ojo, Lagos</div>
      <div class="contact-item">📞 07038007573</div>
    </div>
    
    <div class="footer">All are welcome • Come let us worship together</div>
    <div class="credit">Built by Celestialcyber</div>
  </div>
</body>
</html>
